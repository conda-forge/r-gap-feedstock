{% set version = "1.14" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-gap
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/gap_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/gap/gap_{{ version }}.tar.gz
  sha256: 9b106f9ff683fadefd9da665b0133f7115e7425e28e489346fcd2041fa983e9f

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - cross-r-base {{ r_base }}        # [build_platform != target_platform]
    - r-dplyr                          # [build_platform != target_platform]
    - r-gap.datasets >=0.0.6           # [build_platform != target_platform]
    - r-ggplot2                        # [build_platform != target_platform]
    - r-plotly                         # [build_platform != target_platform]
    - r-rdpack                         # [build_platform != target_platform]
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - {{ compiler('fortran') }}        # [not win]
    - {{ compiler('m2w64_fortran') }}  # [win]
    - {{ posix }}filesystem            # [win]
    - {{ posix }}make
    - {{ posix }}sed                   # [win]
    - {{ posix }}coreutils             # [win]
    - {{ posix }}zip                   # [win]
  host:
    - r-base
    - r-dplyr
    - r-gap.datasets >=0.0.6
    - r-ggplot2
    - r-plotly
    - r-rdpack
  run:
    - r-base
    - r-dplyr
    - r-gap.datasets >=0.0.6
    - r-ggplot2
    - r-plotly
    - r-rdpack

test:
  commands:
    - $R -e "library('gap')"           # [not win]
    - "\"%R%\" -e \"library('gap')\""  # [win]

about:
  home: https://github.com/jinghuazhao/R
  license: GPL-2.0-or-later
  summary: It is designed as an integrated package for genetic data analysis of both population and family data. Currently, it contains functions for sample size calculations of both population-based and family-based designs, probability of familial disease aggregation, kinship calculation, statistics in linkage 
    analysis, and association analysis involving genetic markers including haplotype analysis with or without environmental covariates.
  license_family: GPL3
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3

extra:
  recipe-maintainers:
    - conda-forge/r
    - jenzopr
